<!DOCTYPE html>

<html lang="en">
	<head>
		<meta charset="UTF-8">
		<meta name="viewport" content="width=device-width, initial-scale=1.0">
		<title>Dev Geek Portal</title>

		<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css">
		<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css">

		<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js" defer></script>
		<script src="https://code.jquery.com/jquery-4.0.0.min.js" defer></script>

		<!-- Main JS -->
		<script src="/assets/js/api.js" defer></script>
		<script src="/assets/js/card.js" defer></script>
		<script src="/assets/js/main.js" defer></script>
	</head>
	<body>
		<nav class="navbar navbar-expand-lg d-flex justify-content-between">
			<h3 class="p-3">Dev Geek Portal</h3>

			<div class="d-flex justify-content-center gap-2 p-3">
				<button class="btn btn-secondary" id="page-prev">
					<i class="bi bi-arrow-left"></i>
				</button>
				<label>
					<input type="text" class="form-control" placeholder="Search by character..." id="search">
				</label>
				<button class="btn btn-secondary" id="page-next">
					<i class="bi bi-arrow-right"></i>
				</button>
			</div>

			<div class="d-inline-flex flex-row align-items-center">
				<span>
					Page <span id="page">X</span> of <span id="max-pages">Y</span>
				</span>
				<a class="btn p-3" href="https://github.com/RobotoSkunk/technical-challenge-c" title="Repository">
					<i class="bi bi-github fs-2"></i>
				</a>
			</div>
		</nav>

		<div class="p-3 m-3 text-white bg-danger rounded-3 d-none" id="error"></div>

		<div class="container">
			<div class="row justify-content-center" id="characters-list"></div>
		</div>

		<div class="d-flex m-5 justify-content-center" id="loader">
			<div class="spinner-border" role="status">
				<span class="sr-only"></span>
			</div>
		</div>
	</body>
</html>
