<!DOCTYPE html>

<html lang="en">
	<head>
		<meta charset="UTF-8">
		<meta name="viewport" content="width=device-width, initial-scale=1.0">
		<title>Dev Geek Portal</title>

		<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css">
		<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css">

		<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js" defer></script>
		<script src="https://code.jquery.com/jquery-4.0.0.min.js" defer></script>

		<!-- Main JS -->
		<script src="/assets/js/api.js" defer></script>
		<script src="/assets/js/card.js" defer></script>
		<script src="/assets/js/main.js" defer></script>
	</head>
	<body>
		<nav class="navbar navbar-expand-lg">
			<div class="container-fluid">
				<h3>Dev Geek Portal</h3>

				<div>
					<div class="col d-inline p-4">
						Page <span id="page">X</span> of <span id="max-pages">Y</span>
					</div>
					<button class="col btn btn-secondary" id="page-prev">
						<i class="bi bi-arrow-left"></i>
					</button>
					<label class="col">
						<input type="text" class="form-control" placeholder="Search by character...">
					</label>
					<button class="col btn btn-secondary" id="page-next">
						<i class="bi bi-arrow-right"></i>
					</button>
				</div>

				<div></div>
			</div>
		</nav>

		<div class="container">
			<div class="row" id="characters-list"></div>
		</div>
	</body>
</html>
