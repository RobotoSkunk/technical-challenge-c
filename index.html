<!DOCTYPE html>

<html lang="en">
	<head>
		<meta charset="UTF-8">
		<meta name="viewport" content="width=device-width, initial-scale=1.0">
		<title>Dev Geek Portal</title>

		<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css">
		<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css">
		<link rel="stylesheet" href="./assets/css/stylesheet.css">

		<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js" defer></script>
		<script src="https://code.jquery.com/jquery-4.0.0.min.js" defer></script>

		<!-- Main JS -->
		<script src="./assets/js/api.js" defer></script>
		<script src="./assets/js/card.js" defer></script>
		<script src="./assets/js/main.js" defer></script>
	</head>
	<body>
		<nav class="navbar navbar-expand-lg d-flex justify-content-between align-items-center bg-dark-subtle">
			<h3 class="p-3 m-0">Dev Geek Portal</h3>

			<div class="d-flex justify-content-center align-items-center gap-3" id="searchbar">
				<div class="d-flex justify-content-center align-items-center gap-2">
					<button class="btn btn-secondary" id="page-prev">
						<i class="bi bi-arrow-left"></i>
					</button>
					<label>
						<input type="text" class="form-control" placeholder="Search by character..." id="search">
					</label>
					<button class="btn btn-secondary" id="page-next">
						<i class="bi bi-arrow-right"></i>
					</button>
				</div>
				<span>
					Page <span id="page">X</span> of <span id="max-pages">Y</span>
				</span>
			</div>

			<a class="btn p-3" href="https://github.com/RobotoSkunk/technical-challenge-c" target="_blank" title="Repository">
				<i class="bi bi-github fs-2"></i>
			</a>
		</nav>

		<div class="p-3 m-3 text-white bg-danger rounded-3 d-none" id="error"></div>

		<div class="container p-3">
			<div class="row justify-content-center" id="characters-list"></div>
		</div>

		<div class="d-flex m-5 justify-content-center" id="loader">
			<div class="spinner-border" role="status">
				<span class="sr-only"></span>
			</div>
		</div>

		<div class="modal fade" id="modal" tabindex="-1">
			<div class="modal-dialog modal-dialog-centered">
				<div class="modal-content">
					<div class="modal-header">
						<h5 class="modal-title" id="modal-title">If you read this, it means I'm a great developer.</h5>
						<button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
					</div>
					<div class="modal-body">
						<img class="rounded mx-auto d-block" id="modal-picture" width="300" height="300" draggable="false">
						<ul class="list-group list-group-flush">
							<li class="list-group-item">
								<b>Species</b>:&nbsp;
								<span id="modal-content-species"></span>
							</li>
							<li class="list-group-item">
								<b>Status</b>:&nbsp;
								<span id="modal-content-status"></span>
							</li>
							<li class="list-group-item">
								<b>Gender</b>:&nbsp;
								<span id="modal-content-gender"></span>
							</li>
							<li class="list-group-item">
								<b>Origin Name</b>:&nbsp;
								<span id="modal-content-origin-name"></span>
							</li>
							<li class="list-group-item">
								<b>Location Name</b>:&nbsp;
								<span id="modal-content-location-name"></span>
							</li>
						</ul>
					</div>
					<div class="modal-footer">
						<button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Close</button>
					</div>
				</div>
			</div>
		</div>
	</body>
</html>
